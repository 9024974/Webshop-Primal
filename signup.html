<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – PRIMAL</title>
<meta name="description" content="Create a new PRIMAL account.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main>
    <section class="auth-page" aria-label="Sign up form">
      <div class="auth-box">

        <h1>Sign Up</h1>
        <p>Enter your email and password to sign up</p>

        <input
          type="email"
          id="signup-email"
          class="auth-field"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email address"
          required
        >

        <input
          type="password"
          id="signup-password"
          class="auth-field"
          placeholder="Password"
          autocomplete="new-password"
          aria-label="Password"
          required
        >

        <p class="auth-error" id="signup-error" role="alert"></p>

        <button class="btn-auth" onclick="handleSignUp()">SIGN UP</button>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Login</a>
        </p>

      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
  <script src="components.js"></script>
  <script>
   
    function handleSignUp() {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const errorEl = document.getElementById('signup-error');

      errorEl.classList.remove('visible');

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.classList.add('visible');
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.classList.add('visible');
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('visible');
        return;
      }

      const users = lsGet('primal_users', []);

      const alreadyExists = users.some(u => u.email === email);
      if (alreadyExists) {
        errorEl.textContent = 'This email address is already registered.';
        errorEl.classList.add('visible');
        return;
      }

      users.push({ email, password });
      lsSet('primal_users', users);

      showToast('Account created! Please log in.');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1000);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignUp();
    });

    document.addEventListener('DOMContentLoaded', () => {
      injectNavbar('');
      injectFooter();
      updateNavAuth();
      updateCartBadge();
      initMobileMenu();

      if (getCurrentUser()) {
        window.location.href = 'index.html';
      }
    });
  </script>

</body>
</html>
